<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Canvas - Static Mirror</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #c5a880;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 60px 20px 20px;
        }
        .subtitle {
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            font-family: Georgia, serif;
            font-weight: 400;
            letter-spacing: -1px;
        }
        .nav-container {
            position: sticky;
            top: 0;
            background-color: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            margin-top: 30px;
        }
        .nav-tabs {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #666;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
            cursor: pointer;
            padding: 8px 16px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .tab-btn:hover {
            color: var(--text-color);
        }
        .tab-btn.active {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-weight: 700;
            border-radius: 4px;
        }
        .gallery-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .gallery-item {
            display: flex;
            flex-direction: column;
            background-color: #111;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-4px);
        }
        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%;
            background-color: #151515;
        }
        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-details {
            padding: 20px;
            border-top: 1px solid #1a1a1a;
        }
        .item-details h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            font-weight: 400;
            font-family: Georgia, serif;
        }
        .item-tag {
            font-size: 11px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        footer {
            text-align: center;
            padding: 80px 0 40px;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <header>
        <div class="subtitle">✨ The Premier Collection</div>
        <h1>Divine Canvas</h1>
    </header>

    <div class="nav-container">
        <!-- The layout buttons are now managed entirely by JavaScript -->
        <div class="nav-tabs" id="navTabs">
            <button class="tab-btn active" onclick="filterGallery('ALL')">All</button>
        </div>
    </div>

    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <footer>
        DIVINE CANVAS EXHIBITION &copy; KINSHOOK CHATURVEDI 2026
    </footer>

    <script>
        const grid = document.getElementById('galleryGrid');
        const navTabs = document.getElementById('navTabs');

        // 1. Fetch real-time filesystem structures from your serverless API route
        fetch('/api/gallery')
            .then(response => {
                if (!response.ok) throw new Error("API Route failure status");
                return response.json();
            })
            .then(galleryRegistry => {
                renderNavigation(galleryRegistry);
                renderGallery(galleryRegistry);
            })
            .catch(err => {
                console.error("Error loading gallery structure live:", err);
                grid.innerHTML = `<p style="color: white; text-align: center; width: 100%;">Failed to load live gallery assets. Ensure your api/gallery.js environment is configured.</p>`;
            });

        // 2. Dynamically build category tabs from API data keys
        function renderNavigation(galleryRegistry) {
            // Re-initialize with the default master "All" tab
            navTabs.innerHTML = '<button class="tab-btn active" onclick="filterGallery(\'ALL\')">All</button>';
            
            Object.keys(galleryRegistry).forEach(categoryKey => {
                if (categoryKey === 'ALL') return; // Prevent duplicating if your API serves an 'ALL' key
                
                const deity = galleryRegistry[categoryKey];
                const buttonHTML = `<button class="tab-btn" onclick="filterGallery('${categoryKey}')">${deity.title}</button>`;
                navTabs.insertAdjacentHTML('beforeend', buttonHTML);
            });
        }

        // 3. Render out asset nodes dynamically mapped by folder structures
        function renderGallery(galleryRegistry) {
            grid.innerHTML = ""; // Flush loaders
            
            Object.keys(galleryRegistry).forEach(categoryKey => {
                if (categoryKey === 'ALL') return; 
                
                const deity = galleryRegistry[categoryKey];
                deity.images.forEach(fileName => {
                    const itemHTML = `
                        <div class="gallery-item" data-category="${categoryKey}">
                            <div class="image-wrapper">
                                <img src="images/${deity.folder}/${fileName}" alt="${deity.title}" loading="lazy">
                            </div>
                            <div class="item-details">
                                <h2>${deity.title}</h2>
                                <div class="item-tag">Vedic Realism</div>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', itemHTML);
                });
            });
        }

        // 4. Interactive navigation filter functionality
        function filterGallery(category) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                // Check against button text or explicitly passed event targets
                if (btn.getAttribute('onclick').includes(`'${category}'`)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                const itemCat = item.getAttribute('data-category');
                if (category === 'ALL' || itemCat === category) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
